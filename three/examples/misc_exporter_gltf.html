<!DOCTYPE html>
<html lang="en">
	<head>

	</head>
	<body>
		<style>
            .my_text
            {
                font-family:    Arial, Helvetica, sans-serif;

                font-weight:    bold;
            }
        </style>

		<div class="my_text" id="info">

			<a href="https://www.unmc.edu/iexcel/visualization/index.html" target="_blank" rel="noopener">iEXCEL</a> Dentistry
		</div>



		

		<!-- Import maps polyfill -->
		<!-- Remove this when import maps will be widely supported -->
		<script async src="https://unpkg.com/es-module-shims@1.3.6/dist/es-module-shims.js"></script>

		<script type="importmap">
			{
				"imports": {
					"three": "../build/three.module.js"
				}
			}
		</script>

		<script type="module">

			import * as THREE from 'three';

			import { OBJLoader } from './jsm/loaders/OBJLoader.js';
			import { GLTFLoader } from './jsm/loaders/GLTFLoader.js';
			import { RGBELoader } from './jsm/loaders/RGBELoader.js';
			import { GLTFExporter } from './jsm/exporters/GLTFExporter.js';
			import { GUI } from './jsm/libs/lil-gui.module.min.js';
			import { OrbitControls } from './jsm/controls/OrbitControls.js';
			import { OutlinePass } from './jsm/postprocessing/OutlinePass.js';

			function exportGLTF( input ) {

				const gltfExporter = new GLTFExporter();

				const options = {
					hideShow: params.hideShow,
					//isolate: params.isolate

				};
			

			}

			const link = document.createElement( 'a' );
			link.style.display = 'none';
			document.body.appendChild( link ); // Firefox workaround, see #6594

			function save( blob, filename ) {

				link.href = URL.createObjectURL( blob );
				link.download = filename;
				link.click();

				// URL.revokeObjectURL( url ); breaks Firefox...

			}

			function saveString( text, filename ) {

				save( new Blob( [ text ], { type: 'text/plain' } ), filename );

			}


			function saveArrayBuffer( buffer, filename ) {

				save( new Blob( [ buffer ], { type: 'application/octet-stream' } ), filename );

			}

			let container;

			let camera, object, object2, material, geometry, scene1, scene2, renderer, controls;
			let gridHelper, sphere, waltHead, carm;
			let spriteC;
			let mapC;
			let group;
			let selectedTooth;

			const params = {
				hideShow: true,
				turntable: false,
				isolate: isolate,
				unIsolate: unIsolate,
				openJaw: openJaw


				
			};

			init();
			animate();

			function init() {

				container = document.createElement( 'div' );
				document.body.appendChild( container );

				// Make linear gradient texture
				
				const data = new Uint8ClampedArray( 100 * 100 * 4 );

				for ( let y = 0; y < 100; y ++ ) {

					for ( let x = 0; x < 100; x ++ ) {

						const stride = 4 * ( 100 * y + x );

						data[ stride ] = Math.round( 255 * y / 99 );
						data[ stride + 1 ] = Math.round( 255 - 255 * y / 99 );
						data[ stride + 2 ] = 0;
						data[ stride + 3 ] = 255;

					}

				}

				const gradientTexture = new THREE.DataTexture( data, 100, 100, THREE.RGBAFormat );
				gradientTexture.minFilter = THREE.LinearFilter;
				gradientTexture.magFilter = THREE.LinearFilter;
				gradientTexture.needsUpdate = true;

				scene1 = new THREE.Scene();
				scene1.name = 'Scene1';


				

				// ---------------------------------------------------------------------
				// Perspective Camera
				// ---------------------------------------------------------------------
				camera = new THREE.PerspectiveCamera( 45, window.innerWidth / window.innerHeight, 1, 2000 );
				camera.position.set( 0,0,800 );

				camera.name = 'PerspectiveCamera';


				scene1.add( camera );

				// ---------------------------------------------------------------------
				// Ambient light
				// ---------------------------------------------------------------------
				const ambientLight = new THREE.AmbientLight( 0xffffff, 0.2 );
				ambientLight.name = 'AmbientLight';
				//ambientLight.castShadow = true;
				scene1.add( ambientLight );

				// ---------------------------------------------------------------------
				// DirectLight
				// ---------------------------------------------------------------------
				const dirLight = new THREE.DirectionalLight( 0xffffff, 1 );
				dirLight.target.position.set( 0, 0, - 1 );
				dirLight.add( dirLight.target );
				dirLight.lookAt( - 1, - 1, 0 );
				dirLight.name = 'DirectionalLight';
				dirLight.castShadow = true;
				dirLight.shadow.mapSize.width = 1024;
				dirLight.shadow.mapSize.height = 1024;
				scene1.add( dirLight );

				//---------------------------------------------------------------------
				// KEYBOARD CONTROL
				//---------------------------------------------------------------------

				
				document.onkeydown = function(e) {

					for(var i = 1; i <= 9; i++)
					{
						var toothNum = "tooth_" + i;
						var j = i + 96;
						var k = i + 48;

						if(e.keyCode == j || e.keyCode == k){

							highlightObject(toothNum);
						}
					}
				}


				//---------------------------------------------------------------------
				// HUD SPRITES - ODONTOGRAM
				//---------------------------------------------------------------------


				group = new THREE.Group();
				camera.add( group );

				var imageWidth;
				var imageHeight;
				document.addEventListener( 'mousedown', onPointerMove, false );
				document.addEventListener('touchstart', onPointerMove, false);
				

				const map0 = new THREE.TextureLoader().load( 'textures/odontogram.png', function(tex) {
				imageWidth = tex.image.width / 100;
				imageHeight = tex.image.height / 100;
				const material0 = new THREE.SpriteMaterial( { map: map0 } );
				const sprite = new THREE.Sprite( material0 );
				sprite.scale.set(imageWidth,imageHeight,1);
				sprite.position.set(50,-32,-100)
				//camera.add( sprite );
				group.add( sprite );;
				});


				for(var i = 1; i <= 28; i++){

				var path = "textures/tooth_selection/tooth_" + i + ".png";

				const map1 = new THREE.TextureLoader().load( path, function(tex) {
				imageWidth = tex.image.width / 100;
				imageHeight = tex.image.height / 100;
				const material1 = new THREE.SpriteMaterial( { map: map1 } );
				const sprite = new THREE.Sprite( material1 );
				sprite.scale.set(imageWidth,imageHeight,1);
				sprite.position.set(50,-32,-100)
				//camera.add( sprite );
				group.add( sprite );
				sprite.visible = false;
				});
			}


				////MAPPING PIXEL VALUES TO EVERY TOOTH
				
				//detect the click and query if the user clicked
				//on the odontogram
				let selectedObject = null;
				const raycaster = new THREE.Raycaster();
				const pointer = new THREE.Vector2();

				function onPointerMove( event ) {

					if ( selectedObject ) {

						//selectedObject.material.color.set( '#69f' );
						selectedObject = null;

					}

					pointer.x = ( event.clientX / window.innerWidth ) * 2 - 1;
					pointer.y = - ( event.clientY / window.innerHeight ) * 2 + 1;

					raycaster.setFromCamera( pointer, camera );

					const intersects = raycaster.intersectObject( group, true );



					if ( intersects.length > 0 ) {

						const res = intersects.filter( function ( res ) {

							return res && res.object;

						} )[ 0 ];

						if ( res && res.object ) {

							selectedObject = res.object;

							//if the user did click on the odontogram, query the pixel value of the
							//point of click and store it in intersectX and intersectY
							var intersectX = intersects[0].uv.x * imageWidth * 100;
							var intersectY =  (imageHeight - (intersects[0].uv.y * imageHeight)) * 100;



							//coverage area of every tooth on the
							//odontogram image in the format [x1,x2,y1,y2]
							var toothReg = [[330,555,170,643],
										[555,813,142,664],
										[813,982,142,661],
										[982,1160,127,643],
										[1160,1336,46,650],
										[1336,1486,140,660],
										[1486,1705,142,688],
										[1785,2009,136,685],
										[2009,2157,131,658],
										[2157,2330,57,650],
										[2330,2519,131,633],
										[2519,2675,140,658],
										[2675,2930,156,666],
										[2930,3161,156,666],
										[314,561,748,1242],
										[561,816,740,1234],
										[816,980,740,1240],
										[980,1153,740,1226],
										[1153,1334,740,1316],
										[1334,1499,748,1234],
										[1499,1696,732,1242],
										[1795,1992,732,1234],
										[1992,2157,748,1250],
										[2157,2330,724,1300],
										[2330,2519,740,1258],
										[2519,2675,740,1242],
										[2675,2938,740,1258],
										[2938,3169,740,1250]
											
											];


							

							//query if the click was in the coverage area
							//of any tooth and then highlight that tooth
							for(var i = 1; i <=28; i++){

									

									if(group.children[i].visible = true){
										group.children[i].visible = false;
									}

									var toothNum = "tooth_" + i;

									if( toothReg[i-1][0]< intersectX 
										&& intersectX < toothReg[i-1][1]
										&& toothReg[i-1][2] < intersectY 
										&& intersectY < toothReg[i-1][3]){

										var j  = i;
										highlightObject(toothNum);
									
										group.children[i].visible = true;

										setTimeout(function() {
										group.children[j].visible = false;
										}, 5000);


										//feed the selected tooth info to selectedTooth
										//variable for other functions (like isolate) to use
										selectedTooth = carm.getObjectByName(toothNum);

										document.getElementById("info").innerHTML = selectedTooth.name;



										;}

										//console.log(group.children[1].visible);


							}








						}

					}

					}



				
				// ---------------------------------------------------------------------
				// Grid
				// ---------------------------------------------------------------------
				gridHelper = new THREE.GridHelper( 2000, 20, 0x888888, 0x444444 );
				gridHelper.position.y = - 50;
				gridHelper.name = 'Grid';
				//scene1.add( gridHelper );

				// ---------------------------------------------------------------------
				// Axes
				// ---------------------------------------------------------------------
				const axes = new THREE.AxesHelper( 500 );
				axes.name = 'AxesHelper';
				//scene1.add( axes );







				// ---------------------------------------------------------------------
				// Ortho camera
				// ---------------------------------------------------------------------
				const cameraOrtho = new THREE.OrthographicCamera( window.innerWidth / - 2, window.innerWidth / 2, window.innerHeight / 2, window.innerHeight / - 2, 0.1, 10 );
				scene1.add( cameraOrtho );
				cameraOrtho.name = 'OrthographicCamera';

				material = new THREE.MeshLambertMaterial( {
					color: 0xffff00,
					side: THREE.DoubleSide
				} );

				object = new THREE.Mesh( new THREE.CircleGeometry( 50, 20, 0, Math.PI * 2 ), material );
				object.position.set( 200, 0, - 400 );
				////scene1.add( object );

				object = new THREE.Mesh( new THREE.RingGeometry( 10, 50, 20, 5, 0, Math.PI * 2 ), material );
				object.position.set( 0, 0, - 400 );
				////scene1.add( object );

				object = new THREE.Mesh( new THREE.CylinderGeometry( 25, 75, 100, 40, 5 ), material );
				object.position.set( - 200, 0, - 400 );
				////scene1.add( object );

				//
				const points = [];

				for ( let i = 0; i < 50; i ++ ) {

					points.push( new THREE.Vector2( Math.sin( i * 0.2 ) * Math.sin( i * 0.1 ) * 15 + 50, ( i - 5 ) * 2 ) );

				}

				object = new THREE.Mesh( new THREE.LatheGeometry( points, 20 ), material );
				object.position.set( 200, 0, 400 );
				////scene1.add( object );

				// ---------------------------------------------------------------------
				//LOAD THE GLTF FILE
				//////////////////////////////////////////////////////////////////////
				const loader = new OBJLoader();
				loader.load( 'models/obj/walt/carm.obj', function ( obj ) {

					waltHead = obj;
					waltHead.scale.multiplyScalar( 1.5 );
					waltHead.position.set( 400, 0, 0 );
					//scene1.add( waltHead );
					

				} );

				const gltfLoader = new GLTFLoader();
				gltfLoader.load( 'models/gltf/denture.glb', function ( gltf ) {

					carm = gltf.scene;
					carm.scale.multiplyScalar( 350 );
					carm.position.set( 0,-50,0 );

					//carm.getObjectByName("mainBody").material.color.set( "rgb(255, 0, 0)" );
					carm.castShadow = true;
					carm.receiveShadow = true;
					scene1.add( carm );
					


				} );

;

				// ---------------------------------------------------------------------
				// HDRI - IMAGE BASED LIGHTING
				// ---------------------------------------------------------------------
				new RGBELoader()
				.setPath('textures/equirectangular/')
				.load('brown_photostudio_01_2k.hdr', function (texture) {

					
					texture.mapping = THREE.EquirectangularReflectionMapping;

					

					
					//scene1.background = texture;
					scene1.background = new THREE.Color( "rgb(23, 25, 33)" );
					scene1.environment = texture;

				});




				renderer = new THREE.WebGLRenderer( { antialias: true } );
				renderer.setPixelRatio( window.devicePixelRatio );
				renderer.setSize( window.innerWidth, window.innerHeight );
				renderer.shadowMap.enabled = true;



				container.appendChild( renderer.domElement );

				controls = new OrbitControls( camera, renderer.domElement );
				controls.listenToKeyEvents( window ); // optional
				controls.enableDamping = false; // an animation loop is required when either damping or auto-rotation are enabled
				controls.dampingFactor = 0.05;

				controls.screenSpacePanning = true;

				//controls.minDistance = 100;
				//controls.maxDistance = 1000;

				controls.maxPolarAngle = Math.PI / 2;

				

				//

				window.addEventListener( 'resize', onWindowResize );

				const gui = new GUI();

				let h = gui.addFolder( 'Settings' );
				//h.add( params, 'trs' ).name( 'Use TRS' );
				//h.add( params, 'onlyVisible' ).name( 'Only Visible Objects' );
				//h.add( params, 'truncateDrawRange' ).name( 'Truncate Draw Range' );
				//h.add( params, 'binary' ).name( 'Binary (GLB)' );
				//h.add( params, 'maxTextureSize', 2, 8192 ).name( 'Max Texture Size' ).step( 1 );
				h.add(params, 'hideShow').name('Hide or Show').onChange(function(){ 
					
					if(carm.getObjectByName("mainBody").visible){
					carm.getObjectByName("mainBody").visible = false;}

					else{
						carm.getObjectByName("mainBody").visible = true;
					}
				
				});

				h.add(params, 'turntable').name('Turntable');



				h = gui.addFolder( 'HIGHLIGHTS' );

				//h.add( params, 'exportScenes' ).name( 'Export Scene 1 and 2' );
				//h.add( params, 'exportSphere' ).name( 'Export Sphere' );
				//h.add( params, 'exportHead' ).name( 'Export Head' );
				//h.add( params, 'exportObjects' ).name( 'Export Sphere With Grid' );
				//h.add( params, 'exportSceneObject' ).name( 'Export Scene 1 and Object' );
				h.add(params, 'isolate').name('Isolate Selected Tooth');
				h.add(params, 'unIsolate').name('Un-isolate');
				h.add(params, 'openJaw').name('Open/Close Jaw');

				

				gui.open();

			}





			function highlightObject(name) {



				var blue =  new THREE.Color("rgb(0,115,130)");
				var black =  new THREE.Color(0,0,0);
				var white = new THREE.Color(1,1,1);


				//UNHIGHLIGHT EVERYTHING ELSE

				carm.traverse( function( object ) {

				if(object.material){
				if ( object.material.emissive.equals(blue))
				{
					object.material.emissive.set(black);
					
				} 
			}
				} );
				/////////////////////////////////////


				object = carm.getObjectByName(name);
				var emitColor = object.material.emissive;
				//var diffColor = carm.getObjectByName("mainBody").material.color;




				if(emitColor.equals(black)){
					
					//diffColor.set(blue);
					emitColor.set(blue);
				}
				else{
					emitColor.set(black);
					//diffColor.set(white);
				}


				setTimeout(function() {
					emitColor.set(black);
					//diffColor.set(white);
				}, 5000);



				//carm.getObjectByName("mainBody").material.emissive.set("rgb(0, 100, 255)");



				}

		

			function hideShow() {

				waltHead.visible = false;

			}


			

			function isolate() {

				unIsolate();
				carm.traverse( function( object ) {
			
			if(selectedTooth != null){
				if(object.type == "Mesh"
				&& object.name != selectedTooth.name){

					
					object.visible = false;		



				}

				

			}
			else{
				document.getElementById("info").innerHTML = "Please select a tooth from the odontogram!";
				
			}
				} );


				
			}

			function unIsolate() {

			carm.traverse( function( object ) {

			if(object.type == "Mesh"){

				
				object.visible = true;		


			}
			} );

			}

			function openJaw() {

				var lowerJaw = carm.getObjectByName("lowerJawGrp");

				if(lowerJaw.rotation.x == 0)
				{
					lowerJaw.rotation.x = 0.3;
				}
				else
				{
					lowerJaw.rotation.x = 0;
				}
				
			}


			

			function onWindowResize() {

				camera.aspect = window.innerWidth / window.innerHeight;
				camera.updateProjectionMatrix();

				renderer.setSize( window.innerWidth, window.innerHeight );

			}

			//

			

			function animate() {

				requestAnimationFrame( animate );


				if(!params.turntable){
				render();}
				else{
					rotateCam();
				}

			}

			function render() {


				renderer.render( scene1, camera );

			}

			function rotateCam(){

				const timer = Date.now() * 0.0001;

				
				camera.position.x = Math.cos( timer ) * 800;
				camera.position.y = 100;
				camera.position.z = Math.sin( timer ) * 800;

				camera.lookAt( 0,0,0);
				
				renderer.render( scene1, camera );

			}

		</script>

	</body>
