				const data = new Uint8ClampedArray( 100 * 100 * 4 );

						const stride = 4 * ( 100 * y + x );

						data[ stride ] = Math.round( 255 * y / 99 );
						data[ stride + 1 ] = Math.round( 255 - 255 * y / 99 );
						data[ stride + 2 ] = 0;
						data[ stride + 3 ] = 255;

					}

				}

			function jawViewOn(){

			var upperJaw = carm.getObjectByName("upperJawGrp");
			var lowerJaw = carm.getObjectByName("lowerJawGrp");


				
				
				upperJaw.rotation.x = -Math.PI/2; //-90 degrees in radians
				lowerJaw.rotation.x = Math.PI/2; //90 degrees in radians

				lowerJaw.position.z = 20;
				upperJaw.position.y = 0;  


				carm.getObjectByName("RLMaxilla1").visible = false;
				carm.getObjectByName("mandibleLow").visible = false;
				carm.getObjectByName("Arteries").visible = false;
				carm.getObjectByName("Veins").visible = false;
				carm.getObjectByName("Skin_Nerves").visible = false;


			}

			function jawViewOff(){
			
			var upperJaw = carm.getObjectByName("upperJawGrp");
			var lowerJaw = carm.getObjectByName("lowerJawGrp");

			upperJaw.rotation.x = 0;
			lowerJaw.rotation.x = 0;

			lowerJaw.position.z = -40.914299;
			upperJaw.position.y = 42.4481010;

			carm.getObjectByName("RLMaxilla1").visible = true;
			carm.getObjectByName("mandibleLow").visible = true;

			toggle = false;			

			//initiate positon vectors
			//for selection 1 and 2 for compare
			var onePos = new THREE.Vector3();
			var twoPos = new THREE.Vector3();

			var one,two;

			function compare(){

				//if COMPARE is clicked 
				if(toggle == false){				

					toggle = true;
					
					//turn the background light blue to show that compare mode is on
					compareButton.domElement.style.backgroundColor = "lightBlue";

					//switch the jaw view off if it is turned on first
					//to avoid unexpected rotations
					jawViewOff();

				document.getElementById("info").innerHTML = "Select the first tooth.";

				document.addEventListener( 'mousedown', onSelectionOne, false );
				document.addEventListener('touchstart', onSelectionOne, false);


				function onSelectionOne(){



				while(intersects_Mesh <= 0){

					onSelectionOne();

				}
				if(intersects_Mesh.length > 0){
				
				one = selectedTooth;



				document.removeEventListener( 'mousedown', onSelectionOne, false );
				document.removeEventListener('touchstart', onSelectionOne, false);

				document.getElementById("info").innerHTML = "Select the second tooth.";
	
			}
				document.addEventListener( 'mousedown', onSelectionTwo, false );
				document.addEventListener('touchstart', onSelectionTwo, false);
				

				function onSelectionTwo(){



					if(intersects_Mesh.length > 0){



				two = selectedTooth;

				//var two = carm.getObjectByName("tooth_28");

				document.removeEventListener( 'mousedown', onSelectionTwo, false );
				document.removeEventListener('touchstart', onSelectionTwo, false);

	

				document.getElementById("info").innerHTML = "Comparing teeth " + one.name.substring(6) + " and " + two.name.substring(6);

				onePos.copy(one.position);
				twoPos.copy(two.position);


				carm.traverse( function( object ) {


					//make every MESH invisible
					//except for the selected ones
					if(object.type == "Mesh"
					&& object != one
					&& object != two){


						object.visible = false;
						
						
						

					}
					} );	


					

					//make the selected two teeth larger
					//and set particular position for those

							
					one.position.set(0 - one.parent.position.x - 20, 0 + one.parent.position.z, 0 + one.parent.position.y);				
					one.scale.set(3,3,3);
					
					
					two.position.set(0 - two.parent.position.x + 20, 0 + two.parent.position.z, 0 + two.parent.position.y);
					two.scale.set(3,3,3);

					var oneToothNum = parseInt(one.name.substring(6));
					var twoToothNum = parseInt(two.name.substring(6));


					document.getElementById("compareLeft").innerHTML = "Tooth: <font style='color:red;'>" + teethNames[oneToothNum] + " (" + oneToothNum + ")" + "</font><br> Number of Roots: # <br> Number of Canals: # <br> Comments:";
					document.getElementById("compareRight").innerHTML = "Tooth: <font style='color:red;'>" + teethNames[twoToothNum] + " (" +  twoToothNum + ")" + "</font><br> Number of Roots: # <br> Number of Canals: # <br> Comments:";

									

					


				}
				}		
			}
	}



				//if COMPARE is clicked again
				else {
					
					toggle = false;

					//turn the background of the Compare Mode button transparent again to show that compare mode is on
					compareButton.domElement.style.backgroundColor = "transparent";

					carm.traverse( function( object ) {


					
						if(object.type == "Mesh"
						&& object.name != "curveOfSpee"
						&& object.name != "curveOfWilson"
						&& object.name != "sphereOfMonson"
						&& object.name != "Skin_Nerves"
						&& object.name != "Arteries"
						&& object.name != "Veins"){


							object.visible = true;
							
							
							

						}
						} );

		
				//reset scale and position for selected teeth				
				one.position.set(onePos.x,onePos.y,onePos.z);
				one.scale.set(1,1,1);

				two.position.set(twoPos.x,twoPos.y,twoPos.z);
				two.scale.set(1,1,1);

				document.getElementById("info").innerHTML = "iEXCEL - Dentistry";

				document.getElementById("compareLeft").innerHTML = "";
				document.getElementById("compareRight").innerHTML = "";


				}



	




			}

			//// DEVELOPMENT LOBES FUNCTION
			/////////////////////////////////////////////////////////////////////////////////////////
			function devLobes(){


				if(selectedTooth == null){

					document.getElementById("info").innerHTML = "Please select a tooth from the odontogram or by clicking on a tooth!";

				}

				var toothObject = selectedTooth;
				var toothMat = selectedTooth.material;

				var colorMap = new THREE.TextureLoader().load( "./three/examples/textures/devLobes/devLobe_tooth_8.png" );
				
				if(toothMat.map == null){
				toothMat.map = colorMap;
				toothMat.needsUpdate = true;}

				else{

					toothMat.map = null;
					toothMat.needsUpdate = true;
				}

			// HIGHLIGHT OBJECT FUNCTION //////////////////////////////////
			///////////////////////////////////////////////////////////////
			function highlightObject(name) {



				var blue =  new THREE.Color("rgb(0,115,130)");
				var black =  new THREE.Color(0,0,0);
				var white = new THREE.Color(1,1,1);


				//UNHIGHLIGHT EVERYTHING ELSE

				carm.traverse( function( object ) {

				if(object.material){
				if ( object.material.emissive.equals(blue))
				{
					object.material.emissive.set(black);
					
				} 
			}
				} );
				/////////////////////////////////////


				object = carm.getObjectByName(name);
				var emitColor = object.material.emissive;
				//var diffColor = carm.getObjectByName("mainBody").material.color;




				if(emitColor.equals(black)){
					
					//diffColor.set(blue);
					emitColor.set(blue);
				}
				else{
					emitColor.set(black);
					//diffColor.set(white);
				}


				setTimeout(function() {
					emitColor.set(black);
					//diffColor.set(white);
				}, 5000);



				//carm.getObjectByName("mainBody").material.emissive.set("rgb(0, 100, 255)");



				}


			function highlightOdontogram(toothNumber){


			//UN-HIGHLIGHT THE ODONTOGRAM
			for(var i = 1; i <=28; i++)
			{
				if(group.children[i].visible == true){
				group.children[i].visible = false;}
			}

			//AND THEN HIGHLIGHT THE TOOTH NUMBER THAT'S SELECTED
			//BY MAKING THAT TOOTH-HIGHLIGHT-PNG VISIBLE
			group.children[toothNumber].visible = true;

			//MAKE THE HIGHLIGHT DISAPPEAR AFTER CERTAIN AMOUNG
			//OF TIME
			setTimeout(function() {
				group.children[toothNumber].visible = false;
			}, 5000);

			document.getElementById("info").innerHTML = "<font style='color:lightBlue;'> Selected Tooth: </font>" + teethNames[toothNumber] + " (" + toothNumber + ")";

			}

		

			function hideShow() {

				waltHead.visible = false;

			}


			

			function isolate() {

				

				unIsolate();



				
				if(selectedTooth != null){

			carm.traverse( function( object ) {
			
			



				if(object.type == "Mesh"
				&& object.name != selectedTooth.name){

					
					object.visible = false;		



				}

				

			} );

			isolatedTooth = selectedTooth;

			//query world position of the isolated tooth
			//and set cameraLookAt and orbitControls target
			//to this position
			var pos = new THREE.Vector3();

			isolatedTooth.getWorldPosition(pos);

			controls.target = pos;
			isolatedTooth.scale.set(3,3,3);
			camera.lookAt(pos);

			var toothNum = parseInt(isolatedTooth.name.substring(6));
			
			document.getElementById("compareLeft").innerHTML = "Tooth: <b> <font style='color:red;'>" + teethNames[toothNum] + " (" + toothNum + ")" + "</b> <br> </font> Number of Roots: # <br> Number of Canals: # <br> Comments:";

		}
			else{
				document.getElementById("info").innerHTML = "Please select a tooth from the odontogram or by clicking on a tooth!";
				
			}
				


				
			}


			

			function unIsolate() {
			
			//run unisolate only if the user
			//is not in COMPARE mode
			//to avoid unexpected visibility and scale issues
			if(toggle == false) {


			carm.traverse( function( object ) {

			if(object.type == "Mesh"
			&& object.name != "curveOfSpee"
			&& object.name != "curveOfWilson"
			&& object.name != "sphereOfMonson"
			&& object.name != "Skin_Nerves"
			&& object.name != "Arteries"
			&& object.name != "Veins"){

				
				object.visible = true;		


			}
			} );

			if(isolatedTooth != null){
			controls.target = new THREE.Vector3();
			isolatedTooth.scale.set(1,1,1);
			camera.lookAt(0,0,0);
		
			document.getElementById("compareLeft").innerHTML = "";}

			}

		
		//if compare mode is on, display an error.
		else{

			document.getElementById("info").innerHTML = "Un-Isolate cannot work in Compare mode.";

		}
	}
		

			function openJaw() {



				var lowerJaw = carm.getObjectByName("lowerJawGrp");

				if(lowerJaw.rotation.x == 0)
				{
					lowerJaw.rotation.x = 0.3;
				}
				else
				{
					lowerJaw.rotation.x = 0;
				}
				
			}


			

			function onWindowResize() {

				camera.aspect = window.innerWidth / window.innerHeight;
				camera.updateProjectionMatrix();

				renderer.setSize( window.innerWidth, window.innerHeight );

			}

			//

			

			function animate() {

				requestAnimationFrame( animate );


				if(!params.turntable){
				render();}
				else{
					rotateCam();
				}

			}

			function render() {


				renderer.render( scene1, camera );

			}

			function rotateCam(){

				const timer = Date.now() * 0.0001;


				
				camera.position.x = Math.cos( timer ) * 800;
				camera.position.y = 100;
				camera.position.z = Math.sin( timer ) * 800;



				camera.lookAt( 0,0,0);
				
				renderer.render( scene1, camera );

			}

		</script>
